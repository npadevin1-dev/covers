<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>КаверСхрон — Главная</title>
    <style>
        @keyframes text-glow {
            0% { color: #ff00ff; text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff; }
            50% { color: #00ffff; text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff; }
            100% { color: #ff00ff; text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff; }
        }

        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            min-height: 100vh;
            justify-content: center;
            box-sizing: border-box;
        }

        h1 {
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 2.5rem;
            animation: text-glow 4s infinite linear;
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
            z-index: 10;
        }

        /* КОНТЕЙНЕР ДЛЯ АНИМАЦИИ */
        .canvas-container {
            position: relative;
            width: 350px;
            height: 350px;
            margin-bottom: 30px;
            z-index: 5;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* БЛОК НАВИГАЦИИ */
        .menu-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 400px;
            z-index: 10;
        }

        .menu-btn {
            background: #121212;
            color: #ffffff;
            border: 2px solid #ff0000;
            padding: 15px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 0 8px #ff0000;
            transition: all 0.3s ease;
        }

        .menu-btn:hover {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
            box-shadow: 0 0 20px #ffffff;
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <h1>Кавер Схрон</h1>

    <div class="canvas-container">
        <canvas id="anarchyCanvas" width="400" height="400"></canvas>
    </div>

    <div class="menu-container">
        <a href="songs.html" class="menu-btn">🎵 Выбрать песни / Плеер</a>
    </div>

    <script>
        const canvas = document.getElementById('anarchyCanvas');
        const ctx = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;
        const centerX = width / 2;
        const centerY = height / 2;

        const numParticles = 550; // Количество точек
        const particles = [];
        
        // Состояния: 'float' (плавают), 'assemble' (собираются), 'static' (замерли в знаке)
        let currentState = 'float'; 
        let stateTimer = 0;

        // Геометрия знака анархии (координаты целевых точек)
        const targetPositions = [];

        // Функция генерации математической модели знака анархии
        function generateAnarchyTargets() {
            const r = 110; // Радиус кольца анархии
            
            // 1. Окружность (буква О)
            for (let i = 0; i < 220; i++) {
                let angle = (i / 220) * Math.PI * 2;
                targetPositions.push({
                    x: centerX + r * Math.cos(angle),
                    y: centerY + r * Math.sin(angle)
                });
            }

            // 2. Левая палочка буквы А (снизу вверх)
            // Идет от (~220, 290) до (200, 90)
            const leftLegStart = { x: centerX - r * 0.5, y: centerY + r * 0.85 };
            const topPoint = { x: centerX, y: centerY - r * 0.95 };
            for (let i = 0; i < 110; i++) {
                let t = i / 110;
                targetPositions.push({
                    x: leftLegStart.x + (topPoint.x - leftLegStart.x) * t,
                    y: leftLegStart.y + (topPoint.y - leftLegStart.y) * t
                });
            }

            // 3. Правая палочка буквы А (сверху вниз)
            const rightLegEnd = { x: centerX + r * 0.5, y: centerY + r * 0.85 };
            for (let i = 0; i < 110; i++) {
                let t = i / 110;
                targetPositions.push({
                    x: topPoint.x + (rightLegEnd.x - topPoint.x) * t,
                    y: topPoint.y + (rightLegEnd.y - topPoint.y) * t
                });
            }

            // 4. Горизонтальная перекладина буквы А (выходящая за границы)
            const barStart = { x: centerX - r * 0.85, y: centerY + r * 0.15 };
            const barEnd = { x: centerX + r * 0.85, y: centerY + r * 0.15 };
            for (let i = 0; i < 110; i++) {
                let t = i / 110;
                targetPositions.push({
                    x: barStart.x + (barEnd.x - barStart.x) * t,
                    y: barStart.y + (barEnd.y - barStart.y) * t
                });
            }

            // Если частиц больше, чем точек в модели, дублируем их
            while (targetPositions.length < numParticles) {
                targetPositions.push(targetPositions[Math.floor(Math.random() * targetPositions.length)]);
            }
        }

        // Инициализация точек
        function initParticles() {
            for (let i = 0; i < numParticles; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 1.5,
                    vy: (Math.random() - 0.5) * 1.5,
                    size: Math.random() * 2 + 1.2,
                    color: i % 2 === 0 ? '#ff00ff' : '#00ffff', // Неоновые цвета точек
                    targetX: targetPositions[i].x,
                    targetY: targetPositions[i].y
                });
            }
        }

        generateAnarchyTargets();
        initParticles();

        // Главный цикл анимации
        function animate() {
            ctx.clearRect(0, 0, width, height);
            stateTimer++;

            // Машина состояний тайминга
            if (currentState === 'float' && stateTimer > 240) { // 4 секунды плавают
                currentState = 'assemble';
                stateTimer = 0;
            } else if (currentState === 'assemble' && stateTimer > 60) { // 1 секунда на резкий сбор
                currentState = 'static';
                stateTimer = 0;
            } else if (currentState === 'static' && stateTimer > 180) { // 3 секунды стоят в форме знака
                currentState = 'float';
                stateTimer = 0;
                // При распаде даем мощный импульс скорости ("взрыв")
                particles.forEach(p => {
                    p.vx = (Math.random() - 0.5) * 6;
                    p.vy = (Math.random() - 0.5) * 6;
                });
            }

            // Обновление и отрисовка точек
            particles.forEach(p => {
                if (currentState === 'float') {
                    // Точки просто лениво плавают, отражаясь от невидимых стен
                    p.x += p.vx;
                    p.y += p.vy;

                    // Плавное замедление после взрыва до нормальной скорости
                    p.vx *= 0.98;
                    p.vy *= 0.98;

                    if (p.x < 0 || p.x > width) p.vx *= -1;
                    if (p.y < 0 || p.y > height) p.vy *= -1;

                } else if (currentState === 'assemble') {
                    // Резко стягиваются к заготовленным координатам знака анархии
                    // Используем интерполяцию для эффекта разгона-торможения
                    p.x += (p.targetX - p.x) * 0.18;
                    p.y += (p.targetY - p.y) * 0.18;

                } else if (currentState === 'static') {
                    // Стоят на месте, совершая едва заметное тепловое дрожание (микро-хаос)
                    p.x = p.targetX + (Math.random() - 0.5) * 0.6;
                    p.y = p.targetY + (Math.random() - 0.5) * 0.6;
                }

                // Рисуем точку
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                
                // Эффект неонового свечения вокруг каждой точки знака в момент сбора
                if (currentState !== 'float') {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = p.color;
                } else {
                    ctx.shadowBlur = 0;
                }

                ctx.fillStyle = p.color;
                ctx.fill();
            });

            // Сброс свечения контекста перед следующим кадром
            ctx.shadowBlur = 0;

            requestAnimationFrame(animate);
        }

        // Запуск
        animate();
    </script>
</body>
</html>
