<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>КаверСхрон — Главная</title>
    <style>
        @keyframes text-glow {
            0% { color: #ff00ff; text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff; }
            50% { color: #00ffff; text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff; }
            100% { color: #ff00ff; text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff; }
        }

        @keyframes rgb-text {
            0% { color: #ff0055; text-shadow: 0 0 8px #ff0055; }
            33% { color: #00ffcc; text-shadow: 0 0 8px #00ffcc; }
            66% { color: #ffff00; text-shadow: 0 0 8px #ffff00; }
            100% { color: #ff0055; text-shadow: 0 0 8px #ff0055; }
        }

        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            min-height: 100vh;
            justify-content: center;
            box-sizing: border-box;
        }

        h1 {
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 2.5rem;
            animation: text-glow 4s infinite linear;
            margin-top: 0;
            margin-bottom: 25px;
            text-align: center;
        }

        .desc-container {
            width: 100%;
            max-width: 400px;
            background: #0d0d0d;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 35px;
            box-shadow: inset 0 0 15px rgba(255, 0, 255, 0.05);
            box-sizing: border-box;
            text-align: center;
        }

        .rgb-description {
            font-size: 1.1rem;
            line-height: 1.6;
            font-weight: 500;
            letter-spacing: 0.5px;
            margin: 0;
            animation: rgb-text 6s infinite linear;
        }

        .menu-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 400px;
        }

        .menu-btn {
            background: #121212;
            color: #ffffff;
            border: 2px solid #ff0000;
            padding: 15px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 0 8px #ff0000;
            transition: all 0.3s ease;
        }

        .menu-btn:hover {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
            box-shadow: 0 0 20px #ffffff;
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <h1>Кавер Схрон</h1>

    <div class="desc-container">
        <p class="rgb-description">
            Место где собраны все самые избранные песни, которые когда-либо приходили на ум автору сайта и были любимы им и другими людьми, близкими и не очень, адекватными и не очень, такими же как и сам автор :)
        </p>
    </div>

    <div class="menu-container">
        <a href="songs.html" class="menu-btn">🎵 Выбрать песни / Плеер</a>
    </div>

</body>
</html>
