<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>КаверСхрон — Главная</title>
    <style>
        @keyframes text-glow {
            0% { color: #ff00ff; text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff; }
            50% { color: #00ffff; text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff; }
            100% { color: #ff00ff; text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff; }
        }
        @keyframes pulse-glow {
            0% { filter: drop-shadow(0 0 10px #ff0000); transform: translate(-50%, -50%) scale(1); }
            50% { filter: drop-shadow(0 0 25px #ff00ff); transform: translate(-50%, -50%) scale(1.05); }
            100% { filter: drop-shadow(0 0 10px #ff0000); transform: translate(-50%, -50%) scale(1); }
        }
        @keyframes orbit {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        h1 {
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 2.5rem;
            animation: text-glow 4s infinite linear;
            margin-top: 20px;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            font-style: italic;
            font-size: 1rem;
            margin-bottom: 40px;
        }

        /* ТРЁХМЕРНАЯ СЦЕНА ОРБИТЫ */
        .scene3d {
            position: relative;
            width: 300px;
            height: 300px;
            margin-bottom: 50px;
            perspective: 1000px; /* Глубина 3D пространства */
        }

        /* Центральный статичный знак анархии */
        .center-logo {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 130px;
            height: 130px;
            object-fit: contain;
            z-index: 10; /* Держим посередине слоев */
            animation: pulse-glow 4s infinite ease-in-out;
        }

        /* Вращающийся невидимый контейнер-карусель */
        .carousel {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            animation: orbit 12s infinite linear;
        }

        /* Базовый класс для летающих иконок */
        .orbit-icon {
            position: absolute;
            top: 35%;
            left: 35%;
            width: 70px;
            height: 70px;
            object-fit: contain;
            /* Смягчаем пиксели при вращении */
            backface-visibility: visible; 
        }

        /* Расталкиваем иконки по кругу (угол Y) и выносим вперед по оси Z (радиус орбиты) */
        .icon-unity {
            transform: rotateY(0deg) translateZ(140px);
        }
        .icon-fl {
            transform: rotateY(120deg) translateZ(140px);
        }
        .icon-blender {
            transform: rotateY(240deg) translateZ(140px);
        }

        /* БЛОК НАВИГАЦИИ */
        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }

        .menu-btn {
            background: #121212;
            color: #ffffff;
            border: 2px solid #ff0000;
            padding: 15px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 0 8px #ff0000;
            transition: all 0.3s ease;
        }

        .menu-btn:hover {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
            box-shadow: 0 0 20px #ffffff;
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <h1>Кавер Схрон</h1>
    <div class="subtitle">madikens mod v3.0</div>

    <div class="scene3d">
        <img src="anarchy.png" class="center-logo" alt="Anarchy">
        
        <div class="carousel" id="carousel">
            <img src="unity.png" class="orbit-icon icon-unity" id="img-unity" alt="Unity">
            <img src="flstudio.png" class="orbit-icon icon-fl" id="img-fl" alt="FL Studio">
            <img src="blender.png" class="orbit-icon icon-blender" id="img-blender" alt="Blender">
        </div>
    </div>

    <div class="menu-container">
        <a href="songs.html" class="menu-btn">🎵 Выбрать песни / Плеер</a>
        <button class="menu-btn" onclick="alert('Запусти менеджер в Termux для редактирования базы данных!')">🛠 Управление схроном</button>
    </div>

    <script>
        // Небольшой скрипт для компенсации вращения. 
        // Чтобы сами значки во время полета по кругу не разворачивались к нам ребром/боком,
        // мы динамически разворачиваем их плоскость обратно на зрителя.
        const carousel = document.getElementById('carousel');
        const icons = document.querySelectorAll('.orbit-icon');

        function updateIconsFaces() {
            // Получаем текущую матрицу трансформации карусели и вычисляем угол
            const computedStyle = window.getComputedStyle(carousel);
            const transform = computedStyle.getPropertyValue('transform');
            
            let angle = 0;
            if (transform && transform !== 'none') {
                const values = transform.split('(')[1].split(')')[0].split(',');
                const a = values[0];
                const b = values[1];
                const c = values[2];
                const d = values[4];
                // Вытаскиваем приблизительный текущий угол поворота карусели по оси Y
                angle = Math.round(Math.atan2(parseFloat(c), parseFloat(a)) * (180 / Math.PI));
            }

            // Корректируем слои (Z-Index) на лету, чтобы иконки корректно заходили ЗА знак анархии
            icons.forEach(icon => {
                let initialRotation = 0;
                if (icon.classList.contains('icon-unity')) initialRotation = 0;
                if (icon.classList.contains('icon-fl')) initialRotation = 120;
                if (icon.classList.contains('icon-blender')) initialRotation = 240;

                // Суммарный абсолютный угол положения значка в пространстве относительно экрана
                const currentAbsoluteAngle = (angle + initialRotation) % 360;

                // Если значок ушел на заднюю полусферу (от 90 до 270 градусов), понижаем его слой
                if (currentAbsoluteAngle > 90 && currentAbsoluteAngle < 270) {
                    icon.style.zIndex = "5"; 
                    icon.style.opacity = "0.6"; // Немного притеняем на заднем плане для реализма
                } else {
                    icon.style.zIndex = "15";
                    icon.style.opacity = "1";
                }
            });

            requestAnimationFrame(updateIconsFaces);
        }

        // Запускаем постоянный трекинг слоев
        updateIconsFaces();
    </script>
</body>
</html>
