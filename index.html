<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>КаверСхрон — Главная</title>
    <style>
        @keyframes text-glow {
            0% { color: #ff00ff; text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff; }
            50% { color: #00ffff; text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff; }
            100% { color: #ff00ff; text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff; }
        }
        @keyframes pulse-glow {
            0% { filter: drop-shadow(0 0 10px #ff0000); transform: translate(-50%, -50%) scale(1); }
            50% { filter: drop-shadow(0 0 25px #ff00ff); transform: translate(-50%, -50%) scale(1.05); }
            100% { filter: drop-shadow(0 0 10px #ff0000); transform: translate(-50%, -50%) scale(1); }
        }
        @keyframes orbit {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            min-height: 100vh;
            justify-content: center;
        }

        h1 {
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 2.5rem;
            animation: text-glow 4s infinite linear;
            margin-top: 0;
            margin-bottom: 40px;
            text-align: center;
        }

        /* ТРЁХМЕРНАЯ СЦЕНА ОРБИТЫ */
        .scene3d {
            position: relative;
            width: 300px;
            height: 300px;
            margin-bottom: 50px;
            perspective: 1000px;
        }

        /* Центральный статичный знак анархии */
        .center-logo {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 130px;
            height: 130px;
            object-fit: contain;
            z-index: 10;
            animation: pulse-glow 4s infinite ease-in-out;
        }

        /* Вращающийся контейнер */
        .carousel {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            animation: orbit 12s infinite linear;
        }

        /* Базовый класс для летающих иконок */
        .orbit-icon {
            position: absolute;
            top: 35%;
            left: 35%;
            width: 70px;
            height: 70px;
            object-fit: contain;
            backface-visibility: visible; 
        }

        /* Орбиты для трех значков разработки */
        .icon-first {
            transform: rotateY(0deg) translateZ(140px);
        }
        .icon-second {
            transform: rotateY(120deg) translateZ(140px);
        }
        .icon-third {
            transform: rotateY(240deg) translateZ(140px);
        }

        /* БЛОК НАВИГАЦИИ */
        .menu-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 400px;
        }

        .menu-btn {
            background: #121212;
            color: #ffffff;
            border: 2px solid #ff0000;
            padding: 15px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 0 8px #ff0000;
            transition: all 0.3s ease;
        }

        .menu-btn:hover {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
            box-shadow: 0 0 20px #ffffff;
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <h1>Кавер Схрон</h1>

    <div class="scene3d">
        <img src="https://www.dropbox.com/scl/fi/twzpte4l2gxucq7wbvghe/abarhiA.jpg?rlkey=x95xy34xtu0wzvdrhj0xpasp3&st=1zz6r7jp&raw=1" class="center-logo" alt="Anarchy">
        
        <div class="carousel" id="carousel">
            <img src="https://www.dropbox.com/scl/fi/fq6pza0xmcsiolnen4q2n/images-3.png?rlkey=btq58a9hjdh85rzpbjcl18tkg&st=ypitb8f9&raw=1" class="orbit-icon icon-first" alt="Icon 1">
            <img src="https://www.dropbox.com/scl/fi/c6zki16pnxurn9pwjyprp/images.png?rlkey=zssb39zo5uvmpwvz98p2zzyx1&st=npgw6wqo&raw=1" class="orbit-icon icon-second" alt="Icon 2">
            <img src="https://www.dropbox.com/scl/fi/xyxrkrw36hc007rh9bdi6/images-2.png?rlkey=ki7h01xn3by3uq6w683l66ez9&st=ftytjoce&raw=1" class="orbit-icon icon-third" alt="Icon 3">
        </div>
    </div>

    <div class="menu-container">
        <a href="songs.html" class="menu-btn">🎵 Выбрать песни / Плеер</a>
    </div>

    <script>
        const carousel = document.getElementById('carousel');
        const icons = document.querySelectorAll('.orbit-icon');

        function updateIconsFaces() {
            const computedStyle = window.getComputedStyle(carousel);
            const transform = computedStyle.getPropertyValue('transform');
            
            let angle = 0;
            if (transform && transform !== 'none') {
                const values = transform.split('(')[1].split(')')[0].split(',');
                const a = values[0];
                const c = values[2];
                angle = Math.round(Math.atan2(parseFloat(c), parseFloat(a)) * (180 / Math.PI));
            }

            icons.forEach(icon => {
                let initialRotation = 0;
                if (icon.classList.contains('icon-first')) initialRotation = 0;
                if (icon.classList.contains('icon-second')) initialRotation = 120;
                if (icon.classList.contains('icon-third')) initialRotation = 240;

                const currentAbsoluteAngle = (angle + initialRotation) % 360;

                // Управление перекрытием слоев: когда значок сзади — уводим его за анархию
                if (currentAbsoluteAngle > 90 && currentAbsoluteAngle < 270) {
                    icon.style.zIndex = "5"; 
                    icon.style.opacity = "0.5";
                } else {
                    icon.style.zIndex = "15";
                    icon.style.opacity = "1";
                }
            });

            requestAnimationFrame(updateIconsFaces);
        }

        updateIconsFaces();
    </script>
</body>
</html>
