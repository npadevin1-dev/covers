<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>КаверСхрон — Главная</title>
    <style>
        @keyframes text-glow {
            0% { color: #ff00ff; text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff; }
            50% { color: #00ffff; text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff; }
            100% { color: #ff00ff; text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff; }
        }

        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            min-height: 100vh;
            justify-content: center;
            box-sizing: border-box;
        }

        h1 {
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 2.5rem;
            animation: text-glow 4s infinite linear;
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
            z-index: 10;
        }

        .canvas-container {
            position: relative;
            width: 350px;
            height: 350px;
            margin-bottom: 30px;
            z-index: 5;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .menu-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 400px;
            z-index: 10;
        }

        .menu-btn {
            background: #121212;
            color: #ffffff;
            border: 2px solid #ff0000;
            padding: 15px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 0 8px #ff0000;
            transition: all 0.3s ease;
        }

        .menu-btn:hover {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
            box-shadow: 0 0 20px #ffffff;
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <h1>Кавер Схрон</h1>

    <div class="canvas-container">
        <canvas id="anarchyCanvas" width="400" height="400"></canvas>
    </div>

    <div class="menu-container">
        <a href="songs.html" class="menu-btn">🎵 Выбрать песни / Плеер</a>
    </div>

    <script>
        const canvas = document.getElementById('anarchyCanvas');
        const ctx = canvas.getContext('2d');
        const width = canvas.width;
        const height = canvas.height;
        const centerX = width / 2;
        const centerY = height / 2;

        const numParticles = 1000; 
        const particles = [];
        const targetPositions = [];
        
        let currentState = 'float'; // 'float', 'assemble', 'static'
        let stateTimer = 0;

        // Генерация точной геометрии рваного гранж-знака с картинки
        function generateGrungeAnarchy() {
            const r = 105; // Радиус кольца

            // 1. Кольцо О (с текстурными неровностями и утолщениями как на фото)
            for (let i = 0; i < 400; i++) {
                let angle = (i / 400) * Math.PI * 2;
                // Добавляем микро-шум к радиусу, чтобы сымитировать текстуру кисти
                let noise = Math.sin(angle * 12) * 3 + (Math.random() - 0.5) * 4;
                // Локальное утолщение в некоторых частях кольца
                let thick = (Math.random() - 0.5) * 3;
                
                targetPositions.push({
                    x: centerX + (r + noise) * Math.cos(angle) + thick,
                    y: centerY + (r + noise) * Math.sin(angle) + thick
                });
            }

            // 2. Левая стойка буквы 'А' (выходит далеко за пределы кольца вниз-влево)
            const leftStart = { x: centerX - 100, y: centerY + 140 };
            const topPoint = { x: centerX + 5, y: centerY - 110 }; // Смещено чуть вправо в вершине
            for (let i = 0; i < 200; i++) {
                let t = i / 200;
                let noise = (Math.random() - 0.5) * 4;
                targetPositions.push({
                    x: leftStart.x + (topPoint.x - leftStart.x) * t + noise,
                    y: leftStart.y + (topPoint.y - leftStart.y) * t + noise
                });
            }

            // 3. Правая стойка буквы 'А' (идет вниз вправо, рваная текстура)
            const rightEnd = { x: centerX + 115, y: centerY + 125 };
            for (let i = 0; i < 200; i++) {
                let t = i / 200;
                let noise = (Math.random() - 0.5) * 4;
                targetPositions.push({
                    x: topPoint.x + (rightEnd.x - topPoint.x) * t + noise,
                    y: topPoint.y + (rightEnd.y - topPoint.y) * t + noise
                });
            }

            // 4. Длинная перекладина буквы 'А' (сильно вылетает за границы кольца с обеих сторон!)
            // На картинке левый хвост перекладины острый и длинный, правый — уходит вверх-вправо
            const barStart = { x: centerX - 135, y: centerY + 35 };
            const barEnd = { x: centerX + 160, y: centerY - 25 };
            for (let i = 0; i < 200; i++) {
                let t = i / 200;
                let noise = (Math.random() - 0.5) * 3.5;
                targetPositions.push({
                    x: barStart.x + (barEnd.x - barStart.x) * t + noise,
                    y: barStart.y + (barEnd.y - barStart.y) * t + noise
                });
            }

            // Подгоняем размер массива частиц
            while (targetPositions.length < numParticles) {
                targetPositions.push(targetPositions[Math.floor(Math.random() * targetPositions.length)]);
            }
        }

        function initParticles() {
            for (let i = 0; i < numParticles; i++) {
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 2,
                    vy: (Math.random() - 0.5) * 2,
                    size: Math.random() * 1.6 + 1.1,
                    color: i % 2 === 0 ? '#ff00ff' : '#00ffff',
                    targetX: targetPositions[i].x,
                    targetY: targetPositions[i].y
                });
            }
        }

        generateGrungeAnarchy();
        initParticles();

        function animate() {
            ctx.clearRect(0, 0, width, height);
            stateTimer++;

            // Фазы анимации
            if (currentState === 'float' && stateTimer > 220) {
                currentState = 'assemble';
                stateTimer = 0;
            } else if (currentState === 'assemble' && stateTimer > 55) {
                currentState = 'static';
                stateTimer = 0;
            } else if (currentState === 'static' && stateTimer > 150) {
                currentState = 'float';
                stateTimer = 0;
                // Импульс взрыва при распаде
                particles.forEach(p => {
                    p.vx = (Math.random() - 0.5) * 7;
                    p.vy = (Math.random() - 0.5) * 7;
                });
            }

            particles.forEach(p => {
                if (currentState === 'float') {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vx *= 0.98;
                    p.vy *= 0.98;

                    if (p.x < 0 || p.x > width) p.vx *= -1;
                    if (p.y < 0 || p.y > height) p.vy *= -1;

                } else if (currentState === 'assemble') {
                    // Быстрое стягивание в форму знака
                    p.x += (p.targetX - p.x) * 0.24;
                    p.y += (p.targetY - p.y) * 0.24;

                } else if (currentState === 'static') {
                    // Микро-вибрация точек, воспроизводящая эффект «живого» шума
                    p.x = p.targetX + (Math.random() - 0.5) * 0.9;
                    p.y = p.targetY + (Math.random() - 0.5) * 0.9;
                }

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);

                if (currentState !== 'float') {
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = p.color;
                } else {
                    ctx.shadowBlur = 0;
                }

                ctx.fillStyle = p.color;
                ctx.fill();
            });

            ctx.shadowBlur = 0;
            requestAnimationFrame(animate);
        }

        animate();
    </script>
</body>
</html>
