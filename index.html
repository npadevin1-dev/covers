<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кавер Схрон</title>
    <style>
        @keyframes rgb-glow {
            0% { border-color: #ff0000; box-shadow: 0 0 15px #ff0000; }
            15% { border-color: #ff8800; box-shadow: 0 0 15px #ff8800; }
            30% { border-color: #ffff00; box-shadow: 0 0 15px #ffff00; }
            45% { border-color: #00ff00; box-shadow: 0 0 15px #00ff00; }
            60% { border-color: #00ffff; box-shadow: 0 0 15px #00ffff; }
            75% { border-color: #0000ff; box-shadow: 0 0 15px #0000ff; }
            90% { border-color: #ff00ff; box-shadow: 0 0 15px #ff00ff; }
            100% { border-color: #ff0000; box-shadow: 0 0 15px #ff0000; }
        }

        @keyframes title-neon {
            0% { color: #00ffff; text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff; }
            50% { color: #ff00ff; text-shadow: 0 0 10px #ff00ff, 0 0 30px #ff00ff; }
            100% { color: #00ffff; text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff; }
        }

        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 0 15px;
            box-sizing: border-box;
            overflow: hidden;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 4px;
            white-space: nowrap;
            text-align: center;
            animation: title-neon 4s infinite ease-in-out;
        }

        .btn {
            background-color: transparent;
            color: #ffffff;
            padding: 16px 32px;
            font-size: 1.1rem;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 3px solid #ff0000;
            animation: rgb-glow 4s infinite linear;
            transition: transform 0.2s;
        }

        .btn:hover, .btn:active {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <h1>Кавер Схрон</h1>
    <a href="songs.html" class="btn">Выбрать песни</a>
</body>
</html>
