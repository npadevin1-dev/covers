<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>КаверСхрон — Главная</title>
    <style>
        @keyframes text-glow {
            0% { color: #ff00ff; text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff; }
            50% { color: #00ffff; text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff; }
            100% { color: #ff00ff; text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff; }
        }

        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            min-height: 100vh;
            justify-content: center;
            box-sizing: border-box;
        }

        h1 {
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 2.5rem;
            animation: text-glow 4s infinite linear;
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
            z-index: 10;
        }

        .canvas-container {
            position: relative;
            width: 350px;
            height: 350px;
            margin-bottom: 30px;
            z-index: 5;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .menu-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 400px;
            z-index: 10;
        }

        .menu-btn {
            background: #121212;
            color: #ffffff;
            border: 2px solid #ff0000;
            padding: 15px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 0 8px #ff0000;
            transition: all 0.3s ease;
        }

        .menu-btn:hover {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
            box-shadow: 0 0 20px #ffffff;
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <h1>Кавер Схрон</h1>

    <div class="canvas-container">
        <canvas id="anarchyCanvas" width="400" height="400"></canvas>
    </div>

    <div class="menu-container">
        <a href="songs.html" class="menu-btn">🎵 Выбрать песни / Плеер</a>
    </div>

    <script>
        const canvas = document.getElementById('anarchyCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const width = canvas.width;
        const height = canvas.height;

        const numParticles = 2500; // Высокая плотность для точечной структуры
        const particles = [];
        let targetPositions = [];
        
        let currentState = 'float';
        let stateTimer = 0;
        let isReady = false;

        // Вшитая картинка в формате Base64 DataURL
        const img = new Image();
        img.src = "data:image/jpeg;base64," + "";

        img.onload = function() {
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = width;
            tempCanvas.height = height;

            // Рисуем макет знака в буфер памяти
            const size = 300; 
            tempCtx.drawImage(img, (width - size) / 2, (height - size) / 2, size, size);

            const imgData = tempCtx.getImageData(0, 0, width, height).data;

            // Сканируем пиксели оригинального рисунка
            for (let y = 0; y < height; y += 1) {
                for (let x = 0; x < width; x += 1) {
                    const index = (y * width + x) * 4;
                    const r = imgData[index];
                    const g = imgData[index + 1];
                    const b = imgData[index + 2];
                    
                    // Выделяем контуры знака (светлые пиксели на темном фоне)
                    if (r > 140 && g > 140 && b > 140) {
                        targetPositions.push({ x: x, y: y });
                    }
                }
            }

            // Если рисунок не распознался (на случай сбоя b64), создаем дефолтную сетку
            if (targetPositions.length === 0) {
                for(let i=0; i<numParticles; i++) {
                    targetPositions.push({ x: width/2 + Math.cos(i)*100, y: height/2 + Math.sin(i)*100 });
                }
            }

            initParticles();
            isReady = true;
            animate();
        };

        function initParticles() {
            for (let i = 0; i < numParticles; i++) {
                const target = targetPositions[i % targetPositions.length];
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 2.5,
                    vy: (Math.random() - 0.5) * 2.5,
                    size: Math.random() * 1.2 + 0.8, // Делаем точки мелкими и аккуратными
                    targetX: target.x,
                    targetY: target.y
                });
            }
        }

        function animate() {
            if (!isReady) return;
            ctx.clearRect(0, 0, width, height);
            stateTimer++;

            // Фазы: полет (220 кадров) -> сборка (60 кадров) -> фиксация (160 кадров)
            if (currentState === 'float' && stateTimer > 220) {
                currentState = 'assemble';
                stateTimer = 0;
            } else if (currentState === 'assemble' && stateTimer > 60) {
                currentState = 'static';
                stateTimer = 0;
            } else if (currentState === 'static' && stateTimer > 160) {
                currentState = 'float';
                stateTimer = 0;
                // Резкий импульс взрыва во все стороны
                particles.forEach(p => {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 6 + 2;
                    p.vx = Math.cos(angle) * speed;
                    p.vy = Math.sin(angle) * speed;
                });
            }

            particles.forEach(p => {
                if (currentState === 'float') {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vx *= 0.96; // Плавное торможение после взрыва
                    p.vy *= 0.96;

                    if (p.x < 0 || p.x > width) p.vx *= -1;
                    if (p.y < 0 || p.y > height) p.vy *= -1;

                } else if (currentState === 'assemble') {
                    // Плавное, но быстрое стягивание точно в пиксель рисунка
                    p.x += (p.targetX - p.x) * 0.2;
                    p.y += (p.targetY - p.y) * 0.2;

                } else if (currentState === 'static') {
                    // Эффект статического мерцания/шума внутри контура знака
                    p.x = p.targetX + (Math.random() - 0.5) * 0.7;
                    p.y = p.targetY + (Math.random() - 0.5) * 0.7;
                }

                // Отрисовка чисто белых точек
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                
                // Легкое белое неоновое свечение в собранном состоянии
                if (currentState !== 'float') {
                    ctx.shadowBlur = 6;
                    ctx.shadowColor = "#ffffff";
                } else {
                    ctx.shadowBlur = 0;
                }

                ctx.fillStyle = "#ffffff";
                ctx.fill();
            });

            ctx.shadowBlur = 0;
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
