<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>КаверСхрон — Главная</title>
    <style>
        @keyframes text-glow {
            0% { color: #ff00ff; text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff; }
            50% { color: #00ffff; text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff; }
            100% { color: #ff00ff; text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff; }
        }

        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            min-height: 100vh;
            justify-content: center;
            box-sizing: border-box;
        }

        h1 {
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 2.5rem;
            animation: text-glow 4s infinite linear;
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
            z-index: 10;
        }

        .canvas-container {
            position: relative;
            width: 350px;
            height: 350px;
            margin-bottom: 30px;
            z-index: 5;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .menu-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 400px;
            z-index: 10;
        }

        .menu-btn {
            background: #121212;
            color: #ffffff;
            border: 2px solid #ff0000;
            padding: 15px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 0 8px #ff0000;
            transition: all 0.3s ease;
        }

        .menu-btn:hover {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
            box-shadow: 0 0 20px #ffffff;
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <h1>Кавер Схрон</h1>

    <div class="canvas-container">
        <canvas id="anarchyCanvas" width="400" height="400"></canvas>
    </div>

    <div class="menu-container">
        <a href="songs.html" class="menu-btn">🎵 Выбрать песни / Плеер</a>
    </div>

    <script>
        const canvas = document.getElementById('anarchyCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const width = canvas.width;
        const height = canvas.height;

        const numParticles = 1200; // Увеличили для высокой детализации рваных краев
        const particles = [];
        let targetPositions = [];
        
        let currentState = 'float'; // 'float', 'assemble', 'static'
        let stateTimer = 0;
        let isReady = false;

        // Загружаем картинку-шаблон из твоего Dropbox
        const img = new Image();
        img.crossOrigin = "anonymous"; 
        img.src = "https://www.dropbox.com/scl/fi/twzpte4l2gxucq7wbvghe/abarhiA.jpg?rlkey=x95xy34xtu0wzvdrhj0xpasp3&st=1zz6r7jp&raw=1";

        img.onload = function() {
            // Временный виртуальный холст для анализа пикселей
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = width;
            tempCanvas.height = height;

            // Рисуем макет по центру
            const size = 280; 
            tempCtx.drawImage(img, (width - size) / 2, (height - size) / 2, size, size);

            // Сканируем массив пикселей
            const imgData = tempCtx.getImageData(0, 0, width, height).data;

            // Собираем все координаты, где пиксели яркие (белый цвет знака)
            for (let y = 0; y < height; y += 2) {
                for (let x = 0; x < width; x += 2) {
                    const index = (y * width + x) * 4;
                    const r = imgData[index];
                    const g = imgData[index + 1];
                    const b = imgData[index + 2];
                    
                    // Если пиксель светлее определенного порога — это наш знак
                    if (r > 130 && g > 130 && b > 130) {
                        targetPositions.push({ x: x, y: y });
                    }
                }
            }

            // Инициализируем частицы
            initParticles();
            isReady = true;
            animate();
        };

        function initParticles() {
            for (let i = 0; i < numParticles; i++) {
                // Если точек на картинке меньше, берем случайную из доступных
                const target = targetPositions[i % targetPositions.length];
                
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 2,
                    vy: (Math.random() - 0.5) * 2,
                    size: Math.random() * 1.5 + 1,
                    color: i % 2 === 0 ? '#ff00ff' : '#00ffff',
                    targetX: target.x,
                    targetY: target.y
                });
            }
        }

        function animate() {
            if (!isReady) return;
            ctx.clearRect(0, 0, width, height);
            stateTimer++;

            // Переключение режимов анимации
            if (currentState === 'float' && stateTimer > 200) {
                currentState = 'assemble';
                stateTimer = 0;
            } else if (currentState === 'assemble' && stateTimer > 60) {
                currentState = 'static';
                stateTimer = 0;
            } else if (currentState === 'static' && stateTimer > 180) {
                currentState = 'float';
                stateTimer = 0;
                // Эффект взрывного распада
                particles.forEach(p => {
                    p.vx = (Math.random() - 0.5) * 7;
                    p.vy = (Math.random() - 0.5) * 7;
                });
            }

            particles.forEach(p => {
                if (currentState === 'float') {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vx *= 0.97;
                    p.vy *= 0.97;

                    if (p.x < 0 || p.x > width) p.vx *= -1;
                    if (p.y < 0 || p.y > height) p.vy *= -1;

                } else if (currentState === 'assemble') {
                    // Коэффициент 0.22 дает очень резкое, агрессивное стягивание
                    p.x += (p.targetX - p.x) * 0.22;
                    p.y += (p.targetY - p.y) * 0.22;

                } else if (currentState === 'static') {
                    // Текстурный шум (эффект легкого кипения внутри знака)
                    p.x = p.targetX + (Math.random() - 0.5) * 0.8;
                    p.y = p.targetY + (Math.random() - 0.5) * 0.8;
                }

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);

                if (currentState !== 'float') {
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = p.color;
                } else {
                    ctx.shadowBlur = 0;
                }

                ctx.fillStyle = p.color;
                ctx.fill();
            });

            ctx.shadowBlur = 0;
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
