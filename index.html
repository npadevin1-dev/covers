    <style>
        @keyframes text-glow {
            0% { color: #ff00ff; text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff; }
            50% { color: #00ffff; text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff; }
            100% { color: #ff00ff; text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff; }
        }

        body {

            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            min-height: 100vh;
            justify-content: center;
            box-sizing: border-box;
        }

            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 2.5rem;
            animation: text-glow 4s infinite linear;
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
            z-index: 10;
        }

        .canvas-container {
            position: relative;
            width: 350px;
            height: 350px;
            margin-bottom: 30px;
            z-index: 5;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .menu-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 400px;
            z-index: 10;
        }

        .menu-btn {
            background: #121212;
            color: #ffffff;
            border: 2px solid #ff0000;
            padding: 15px 20px;
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 0 8px #ff0000;
            transition: all 0.3s ease;
        }

        .menu-btn:hover {
            background: #ffffff;
            color: #000000;
            border-color: #ffffff;
            box-shadow: 0 0 20px #ffffff;
            transform: scale(1.02);
        }
    </style>

        img.onload = function() {
            const tempCanvas = document.createElement('canvas');
            const tempCtx = tempCanvas.getContext('2d');
            tempCanvas.width = width;
            tempCanvas.height = height;

            const size = 300; 
            tempCtx.drawImage(img, (width - size) / 2, (height - size) / 2, size, size);

            const imgData = tempCtx.getImageData(0, 0, width, height).data;

            for (let y = 0; y < height; y += 1) {
                for (let x = 0; x < width; x += 1) {
                    const index = (y * width + x) * 4;
                    const r = imgData[index];
                    const g = imgData[index + 1];
                    const b = imgData[index + 2];
                    
                    // Сканируем темные пиксели оригинального знака (грандж силуэт)
                    if (r < 180 && g < 180 && b < 180) {
                        targetPositions.push({ x: x, y: y });
                    }
                }
            }

            if (targetPositions.length === 0) {
                for(let i=0; i<numParticles; i++) {
                    targetPositions.push({ x: width/2 + Math.cos(i)*100, y: height/2 + Math.sin(i)*100 });
                }
            }

            initParticles();
            isReady = true;
            animate();
        };

        function initParticles() {
            for (let i = 0; i < numParticles; i++) {
                const target = targetPositions[i % targetPositions.length];
                particles.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 2.5,
                    vy: (Math.random() - 0.5) * 2.5,
                    size: Math.random() * 1.3 + 0.7,
                    targetX: target.x,
                    targetY: target.y
                });
            }
        }

        function animate() {
            if (!isReady) return;
            ctx.clearRect(0, 0, width, height);
            stateTimer++;

            if (currentState === 'float' && stateTimer > 200) {
                currentState = 'assemble';
                stateTimer = 0;
            } else if (currentState === 'assemble' && stateTimer > 60) {
                currentState = 'static';
                stateTimer = 0;
            } else if (currentState === 'static' && stateTimer > 160) {
                currentState = 'float';
                stateTimer = 0;
                particles.forEach(p => {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = Math.random() * 6 + 2;
                    p.vx = Math.cos(angle) * speed;
                    p.vy = Math.sin(angle) * speed;
                });
            }

            particles.forEach(p => {
                if (currentState === 'float') {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vx *= 0.96;
                    p.vy *= 0.96;

                    if (p.x < 0 || p.x > width) p.vx *= -1;
                    if (p.y < 0 || p.y > height) p.vy *= -1;

                } else if (currentState === 'assemble') {
                    p.x += (p.targetX - p.x) * 0.2;
                    p.y += (p.targetY - p.y) * 0.2;

                } else if (currentState === 'static') {
                    p.x = p.targetX + (Math.random() - 0.5) * 0.7;
                    p.y = p.targetY + (Math.random() - 0.5) * 0.7;
                }

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                
                if (currentState !== 'float') {
                    ctx.shadowBlur = 6;
                    ctx.shadowColor = "#ffffff";
                } else {
                    ctx.shadowBlur = 0;
                }

                ctx.fillStyle = "#ffffff";
                ctx.fill();
            });

            ctx.shadowBlur = 0;
            requestAnimationFrame(animate);
        }
    </script>
</body>
