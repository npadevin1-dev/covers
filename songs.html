<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нервы — КаверСхрон</title>
    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            max-width: 600px;
            margin: auto;
            box-sizing: border-box;
        }

        .back-btn {
            display: inline-block;
            background: #111;
            color: #ccc;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            border: 1px solid #333;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }

        h1 {
            text-align: center;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        .album-cover {
            width: 100%;
            border-radius: 12px;
            border: 2px solid #ffff00;
            box-shadow: 0 0 15px rgba(255, 255, 0, 0.3);
            margin-bottom: 25px;
        }

        .track-card {
            background: #111;
            border: 2px solid #ffff00;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 0 10px rgba(255, 255, 0, 0.1);
        }

        .track-title {
            font-size: 1.4rem;
            font-weight: bold;
            margin-bottom: 2px;
        }

        .track-author {
            font-size: 1rem;
            color: #888;
            margin-bottom: 15px;
        }

        .audio-wrapper {
            background: #1a1a1a;
            padding: 10px;
            border-radius: 30px;
            border: 1px solid #00ffff;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
            margin-bottom: 15px;
        }

        audio {
            width: 100%;
            display: block;
        }

        .download-btn {
            display: inline-block;
            background: transparent;
            color: #fff;
            border: 1px solid #fff;
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .download-btn:hover {
            background: #fff;
            color: #000;
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">← К альбомам</a>

    <h1>НЕРВЫ</h1>

    <img src="https://www.dropbox.com/scl/fi/twzpte4l2gxucq7wbvghe/abarhiA.jpg?rlkey=x95xy34xtu0wzvdrhj0xpasp3&st=6uw5yojm&raw=1" class="album-cover" alt="Обложка">

    <div class="track-card">
        <div class="track-title">Осень</div>
        <div class="track-author">Женя Мильковский (в моём исполнении)</div>
        <div class="audio-wrapper">
            <audio controls src="ССЫЛКА_НА_MP3_ОСЕНЬ_C_DROPBOX&raw=1"></audio>
        </div>
        <a href="ССЫЛКА_НА_MP3_ОСЕНЬ_C_DROPBOX&dl=1" class="download-btn" download>Скачать песню</a>
    </div>

    <div class="track-card">
        <div class="track-title">Зажигалки</div>
        <div class="track-author">Нервы</div>
        <div class="audio-wrapper">
            <audio controls src="ССЫЛКА_НА_MP3_ЗАЖИГАЛКИ_C_DROPBOX&raw=1"></audio>
        </div>
        <a href="ССЫЛКА_НА_MP3_ЗАЖИГАЛКИ_C_DROPBOX&dl=1" class="download-btn" download>Скачать песню</a>
    </div>

</body>
</html>
