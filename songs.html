<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список песен</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: auto;
        }
        h1 { text-align: center; }
        .song-card {
            background-color: #1a1a1a;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            border-left: 4px solid #ffffff;
        }
        .song-title { font-size: 1.4rem; font-weight: bold; margin: 0 0 5px 0;}
        .song-author { font-size: 1rem; color: #aaaaaa; margin: 0 0 15px 0;}
        audio { width: 100%; outline: none; }
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            color: #fff;
            text-decoration: none;
            border: 1px solid #fff;
            padding: 5px 15px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Назад</a>
    <h1>Список песен</h1>
    <div id="song-list"></div>

    <script>
        fetch('songs.json')
            .then(response => response.json())
            .then(data => {
                const list = document.getElementById('song-list');
                data.forEach(song => {
                    // Преобразуем ссылку дропбокса для прямого прослушивания
                    const directUrl = song.url.replace('dl=0', 'raw=1');
                    
                    const card = document.createElement('div');
                    card.className = 'song-card';
                    card.innerHTML = `
                        <p class="song-title">${song.title}</p>
                        <p class="song-author">${song.author}</p>
                        <audio controls controlsList="nodownload">
                            <source src="${directUrl}" type="audio/mpeg">
                            Ваш браузер не поддерживает аудио элемент.
                        </audio>
                    `;
                    list.appendChild(card);
                });
            })
            .catch(err => console.error('Ошибка загрузки песен:', err));
    </script>
</body>
</html>
