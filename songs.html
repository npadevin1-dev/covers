<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Альбомы</title>
    <style id="base-styles">
        @keyframes rgb-shadow {
            0% { border-color: #ff0000; box-shadow: 0 0 10px #ff0000; }
            15% { border-color: #ff8800; box-shadow: 0 0 10px #ff8800; }
            30% { border-color: #ffff00; box-shadow: 0 0 10px #ffff00; }
            45% { border-color: #00ff00; box-shadow: 0 0 10px #00ff00; }
            60% { border-color: #00ffff; box-shadow: 0 0 10px #00ffff; }
            75% { border-color: #0000ff; box-shadow: 0 0 10px #0000ff; }
            90% { border-color: #ff00ff; box-shadow: 0 0 10px #ff00ff; }
            100% { border-color: #ff0000; box-shadow: 0 0 10px #ff0000; }
        }
        @keyframes text-glow {
            0% { color: #ff00ff; text-shadow: 0 0 5px #ff00ff; }
            50% { color: #00ffff; text-shadow: 0 0 5px #00ffff; }
            100% { color: #ff00ff; text-shadow: 0 0 5px #ff00ff; }
        }
        @keyframes pulse-cyan {
            0% { box-shadow: 0 0 5px #00ffff; }
            50% { box-shadow: 0 0 15px #00ffff; }
            100% { box-shadow: 0 0 5px #00ffff; }
        }
        body {
            background-color: #050505; color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px; max-width: 800px; margin: auto;
            transition: background 0.3s, color 0.3s;
        }
        h1 {
            text-align: center; font-weight: 800; text-transform: uppercase;
            letter-spacing: 3px; font-size: 2rem; animation: text-glow 4s infinite linear;
            margin-bottom: 30px;
        }

        .play-all-top-btn {
            display: block; width: 100%; text-align: center;
            background: linear-gradient(135deg, #121212, #1a0033); color: #ffffff;
            padding: 15px; margin-bottom: 25px; border-radius: 12px; font-weight: bold;
            font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; cursor: pointer;
            border: 2px solid #ff00ff; box-shadow: 0 0 10px #ff00ff; box-sizing: border-box;
            transition: transform 0.2s;
        }
        .play-all-top-btn:hover { transform: scale(1.02); }

        .albums-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;
        }
        .album-card {
            background-color: #121212; padding: 25px; border-radius: 12px;
            border: 2px solid #ff0000; text-align: center; cursor: pointer;
            animation: rgb-shadow 6s infinite linear; transition: transform 0.2s;
        }
        .album-card:hover { transform: scale(1.03); }
        .album-title { font-size: 1.5rem; font-weight: bold; margin: 0 0 8px 0; color: #fff; }
        .album-author { font-size: 1rem; color: #888; margin: 0; font-style: italic; }

        .album-banner-container { width: 100%; display: flex; justify-content: center; margin-bottom: 25px; }
        .album-banner { max-width: 100%; max-height: 250px; border-radius: 12px; border: 2px solid #ff0000; animation: rgb-shadow 6s infinite linear; object-fit: cover; }

        .mode-selector {
            background: #111; padding: 15px; border-radius: 12px; margin-bottom: 20px;
            display: flex; justify-content: space-around; align-items: center; border: 1px solid #333;
        }
        .mode-btn {
            background: transparent; color: #aaa; border: 1px solid #444; padding: 8px 16px;
            border-radius: 20px; cursor: pointer; font-weight: bold; transition: all 0.3s;
        }
        .mode-btn.active {
            background: #00ffff; color: #000; border-color: #00ffff; box-shadow: 0 0 10px #00ffff;
        }

        .song-card {
            background-color: #121212; padding: 20px; margin-bottom: 25px;
            border-radius: 12px; border: 2px solid #ff0000; animation: rgb-shadow 6s infinite linear;
        }
        .song-card.playing { border-color: #00ffff; box-shadow: 0 0 15px #00ffff; }
        .song-title { font-size: 1.4rem; font-weight: bold; margin: 0 0 5px 0; }
        .song-author { font-size: 1rem; color: #888888; margin: 0 0 15px 0; }

        .custom-player {
            display: flex; align-items: center; background: #1a1a1a; padding: 12px;
            border-radius: 50px; margin-bottom: 15px; border: 1px solid #00ffff; animation: pulse-cyan 3s infinite ease-in-out;
        }
        .play-btn {
            background: #00ffff; border: none; width: 40px; height: 40px; border-radius: 50%;
            color: #000; font-weight: bold; font-size: 1.2rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center; margin-right: 15px; outline: none;
        }
        .progress-bar { flex-grow: 1; height: 6px; background: #333; border-radius: 3px; position: relative; cursor: pointer; margin-right: 15px; }
        .progress-fill { height: 100%; width: 0%; background: #00ffff; border-radius: 3px; box-shadow: 0 0 8px #00ffff; }
        .time-display { font-size: 0.85rem; color: #00ffff; font-family: monospace; white-space: nowrap; }

        .download-btn {
            display: inline-block; background-color: transparent; color: #ffffff; padding: 10px 20px;
            font-size: 0.9rem; text-decoration: none; border-radius: 6px; font-weight: bold;
            border: 1px solid #ffffff; transition: all 0.3s ease;
        }
        .download-btn:hover { background-color: #ffffff; color: #000000; box-shadow: 0 0 15px #ffffff; }

        .back-btn {
            display: inline-block; margin-bottom: 25px; color: #aaa; text-decoration: none;
            border: 1px solid #444; padding: 6px 18px; border-radius: 6px; cursor: pointer;
        }
    </style>
    <style id="custom-theme-runtime"></style>
</head>
<body>
    <div id="top-bar">
        <div id="nav-container">
            <a href="index.html" class="back-btn">← Назад</a>
        </div>
        <div id="global-action-zone"></div>
    </div>

    <h1 id="page-title">Выбор альбома</h1>

    <div id="banner-zone"></div>
    <div id="mode-zone"></div>
    <div id="main-content"></div>

    <script>
        let globalData = null;
        let currentPlaylist = [];
        let currentTrackIndex = -1;
        let isRandomMode = false;
        let activeAudio = null;

        function formatTime(secs) {
            if (isNaN(secs)) return "0:00";
            const m = Math.floor(secs / 60);
            const s = Math.floor(secs % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function applyAlbumTheme(album) {
            const themeStyle = document.getElementById('custom-theme-runtime');
            if (album && album.custom_css) {
                themeStyle.innerHTML = album.custom_css;
                // Гасим RGB перелив ТОЛЬКО у карточек песен и баннера внутри открытого альбома
                document.querySelectorAll('.song-card, .album-banner').forEach(el => {
                    el.style.animation = 'none';
                });
                const pTitle = document.getElementById('page-title');
                if(pTitle) pTitle.className = "album-title";
            } else {
                themeStyle.innerHTML = '';
                document.body.style.background = '#050505';
                document.body.style.color = '#ffffff';
                const pTitle = document.getElementById('page-title');
                if(pTitle) { pTitle.className = ""; pTitle.style.animation = "text-glow 4s infinite linear"; pTitle.style.color = ""; pTitle.style.textShadow = ""; }
            }
        }

        fetch('songs.json')
            .then(res => res.json())
            .then(data => {
                globalData = data;
                showAlbums();
            })
            .catch(err => console.error('Ошибка загрузки:', err));

        function showAlbums() {
            if (activeAudio) { activeAudio.pause(); activeAudio = null; }
            applyAlbumTheme(null);

            document.getElementById('nav-container').innerHTML = '<a href="index.html" class="back-btn">← Назад</a>';
            document.getElementById('page-title').innerText = "Выбор Альбома";
            document.getElementById('banner-zone').innerHTML = "";
            document.getElementById('mode-zone').innerHTML = "";

            const actionZone = document.getElementById('global-action-zone');
            actionZone.innerHTML = `<div class="play-all-top-btn" id="master-play-btn">⚡ Включить всё (Все песни схрона) ⚡</div>`;
            document.getElementById('master-play-btn').onclick = launchAutomationMode;

            const content = document.getElementById('main-content');
            content.className = "albums-grid";
            content.innerHTML = "";

            if (globalData.albums) {
                globalData.albums.forEach((album, idx) => {
                    const card = document.createElement('div');
                    card.className = "album-card";
                    card.style.animationDelay = `${idx * 0.2}s`;
                    card.innerHTML = `
                        <p class="album-title">${album.title}</p>
                        <p class="album-author">${album.author}</p>
                    `;
                    card.onclick = () => showSongsFromAlbum(album, false);
                    content.appendChild(card);
                });
            }
        }

        function launchAutomationMode() {
            const virtualAlbum = {
                title: "Все треки схрона",
                songs: globalData.all_songs || []
            };
            showSongsFromAlbum(virtualAlbum, true);
        }

        function showSongsFromAlbum(album, isAutomation) {
            document.getElementById('page-title').innerText = album.title;
            currentPlaylist = album.songs;
            currentTrackIndex = -1;

            if (!isAutomation) {
                applyAlbumTheme(album);
            } else {
                applyAlbumTheme(null);
            }

            document.getElementById('global-action-zone').innerHTML = "";

            const nav = document.getElementById('nav-container');
            nav.innerHTML = "";
            const backBtn = document.createElement('span');
            backBtn.className = "back-btn";
            backBtn.innerText = "← К альбомам";
            backBtn.onclick = showAlbums;
            nav.appendChild(backBtn);

            const bannerZone = document.getElementById('banner-zone');
            if (!isAutomation && album.gif_url) {
                const rawGif = album.gif_url.replace('dl=0', 'raw=1');
                bannerZone.innerHTML = `<div class="album-banner-container"><img src="${rawGif}" class="album-banner"></div>`;
                if(album.custom_css) {
                    setTimeout(() => {
                        const bnr = bannerZone.querySelector('.album-banner');
                        if(bnr) bnr.style.animation = 'none';
                    }, 50);
                }
            } else { bannerZone.innerHTML = ""; }

            const modeZone = document.getElementById('mode-zone');
            if (isAutomation) {
                modeZone.innerHTML = `
                    <div class="mode-selector">
                        <button id="btn-order" class="mode-btn ${!isRandomMode ? 'active' : ''}">По порядку</button>
                        <button id="btn-random" class="mode-btn ${isRandomMode ? 'active' : ''}">Случайно (Рандом)</button>
                    </div>
                `;
                document.getElementById('btn-order').onclick = () => {
                    isRandomMode = false;
                    document.getElementById('btn-order').classList.add('active');
                    document.getElementById('btn-random').classList.remove('active');
                };
                document.getElementById('btn-random').onclick = () => {
                    isRandomMode = true;
                    document.getElementById('btn-random').classList.add('active');
                    document.getElementById('btn-order').classList.remove('active');
                };
            } else { modeZone.innerHTML = ""; }

            const content = document.getElementById('main-content');
            content.className = "";
            content.innerHTML = "";

            if (!album.songs || album.songs.length === 0) {
                content.innerHTML = "<p style='text-align:center; color:#666;'>В этом списке пока нет песен.</p>";
                return;
            }

            album.songs.forEach((song, index) => {
                const playUrl = song.url.replace('dl=0', 'raw=1');
                const downloadUrl = song.url.replace('dl=0', 'dl=1');

                const card = document.createElement('div');
                card.className = 'song-card track-card';
                card.id = `card-${index}`;
                card.innerHTML = `
                    <p class="song-title">${song.title}</p>
                    <p class="song-author">${song.author}</p>
                    <div class="custom-player">
                        <audio id="audio-${index}" src="${playUrl}" preload="metadata"></audio>
                        <button class="play-btn" id="btn-${index}">▶</button>
                        <div class="progress-bar" id="bar-${index}">
                            <div class="progress-fill" id="fill-${index}"></div>
                        </div>
                        <span class="time-display" id="time-${index}">0:00 / 0:00</span>
                    </div>
                    <a href="${downloadUrl}" download class="download-btn">Скачать песню</a>
                `;
                
                if(!isAutomation && album.custom_css) {
                    card.style.animation = 'none';
                }
                
                content.appendChild(card);

                const audio = card.querySelector(`#audio-${index}`);
                const btn = card.querySelector(`#btn-${index}`);
                const bar = card.querySelector(`#bar-${index}`);
                const fill = card.querySelector(`#fill-${index}`);
                const timeDisp = card.querySelector(`#time-${index}`);

                btn.addEventListener('click', () => { handlePlayClick(index, audio, btn); });
                audio.addEventListener('loadedmetadata', () => { timeDisp.innerText = `0:00 / ${formatTime(audio.duration)}`; });
                audio.addEventListener('timeupdate', () => {
                    const pct = (audio.currentTime / audio.duration) * 100;
                    fill.style.width = `${pct}%`;
                    timeDisp.innerText = `${formatTime(audio.currentTime)} / ${formatTime(audio.duration)}`;
                });
                bar.addEventListener('click', (e) => {
                    const rect = bar.getBoundingClientRect();
                    const pct = (e.clientX - rect.left) / rect.width;
                    audio.currentTime = pct * audio.duration;
                });

                audio.addEventListener('ended', () => {
                    btn.innerText = '▶';
                    fill.style.width = '0%';
                    card.classList.remove('playing');

                    if (isAutomation) {
                        playNextTrack();
                    }
                });
            });
        }

        function handlePlayClick(index, audio, btn) {
            if (activeAudio && activeAudio !== audio) {
                activeAudio.pause();
                const oldIdx = activeAudio.id.split('-')[1];
                const oldBtn = document.getElementById(`btn-${oldIdx}`);
                if (oldBtn) oldBtn.innerText = '▶';
                const oldCard = document.getElementById(`card-${oldIdx}`);
                if (oldCard) oldCard.classList.remove('playing');
            }

            const currentCard = document.getElementById(`card-${index}`);
            if (audio.paused) {
                audio.play();
                btn.innerText = '❚❚';
                currentCard.classList.add('playing');
                activeAudio = audio;
                currentTrackIndex = index;
            } else {
                audio.pause();
                btn.innerText = '▶';
                currentCard.classList.remove('playing');
                activeAudio = null;
            }
        }

        function playNextTrack() {
            if (currentPlaylist.length === 0) return;
            let nextIndex = -1;
            if (isRandomMode) {
                if (currentPlaylist.length > 1) {
                    do {
                        nextIndex = Math.floor(Math.random() * currentPlaylist.length);
                    } while (nextIndex === currentTrackIndex);
                } else { nextIndex = 0; }
            } else {
                nextIndex = currentTrackIndex + 1;
                if (nextIndex >= currentPlaylist.length) { nextIndex = 0; }
            }
            const nextAudio = document.getElementById(`audio-${nextIndex}`);
            const nextBtn = document.getElementById(`btn-${nextIndex}`);
            if (nextAudio && nextBtn) { handlePlayClick(nextIndex, nextAudio, nextBtn); }
        }
    </script>

<script>
document.addEventListener("DOMContentLoaded", function() {
    let currentAudio = null;

    // Функция для получения всех аудио-элементов на странице в текущем плейлисте/альбоме
    function getAudioElements() {
        return Array.from(document.querySelectorAll('audio'));
    }

    // Функция обновления системной шторки Chrome (Media Session)
    function updateMediaSession(audio) {
        if ('mediaSession' in navigator) {
            let audios = getAudioElements();
            let index = audios.indexOf(audio);
            
            // Ищем текстовые данные трека из родительской карточки, не меняя UI
            let card = audio.closest('div');
            let title = "Кавер";
            let artist = "Схрон";
            
            if (card) {
                let titleElement = card.querySelector('h2, h3, .track-title, div');
                if (titleElement) title = titleElement.innerText.split('\n')[0];
            }

            navigator.mediaSession.metadata = new MediaMetadata({
                title: title,
                artist: artist
            });

            // Активируем стрелочку "Вперед" в шторке, если есть следующий трек
            navigator.mediaSession.setActionHandler('nexttrack', index < audios.length - 1 ? function() {
                audios[index].pause();
                audios[index].currentTime = 0;
                audios[index + 1].play().catch(() => {});
            } : null);

            // Активируем стрелочку "Назад" в шторке, если есть предыдущий трек
            navigator.mediaSession.setActionHandler('previoustrack', index > 0 ? function() {
                audios[index].pause();
                audios[index].currentTime = 0;
                audios[index - 1].play().catch(() => {});
            } : null);
        }
    }

    // Навешиваем события на все плееры на странице
    function syncPlayers() {
        let audios = getAudioElements();
        
        audios.forEach((audio, index) => {
            // Когда трек запускается
            audio.addEventListener('play', function() {
                // Если включили другой трек — гасим предыдущий
                if (currentAudio && currentAudio !== audio) {
                    currentAudio.pause();
                    currentAudio.currentTime = 0;
                }
                currentAudio = audio;
                updateMediaSession(audio);
            });

            // МЕХАНИКА АВТОПЕРЕКЛЮЧЕНИЯ: когда песня закончилась, включается следующая карточка
            audio.addEventListener('ended', function() {
                if (index < audios.length - 1) {
                    audios[index + 1].play().catch(err => console.log("Автоплей заблокирован браузером, нужен клик"));
                }
            });
        });
    }

    // Запускаем отслеживание плееров
    syncPlayers();

    // На случай динамической перезагрузки контента менеджером
    const observer = new MutationObserver(syncPlayers);
    observer.observe(document.body, { childList: true, subtree: true });
});
</script>

</body>
</html>
