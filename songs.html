<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Плеер — Выбор Песен</title>
    <style>
        @keyframes rgb-shadow {
            0% { border-color: #ff0000; box-shadow: 0 0 10px #ff0000; }
            15% { border-color: #ff8800; box-shadow: 0 0 10px #ff8800; }
            30% { border-color: #ffff00; box-shadow: 0 0 10px #ffff00; }
            45% { border-color: #00ff00; box-shadow: 0 0 10px #00ff00; }
            60% { border-color: #00ffff; box-shadow: 0 0 10px #00ffff; }
            75% { border-color: #0000ff; box-shadow: 0 0 10px #0000ff; }
            90% { border-color: #ff00ff; box-shadow: 0 0 10px #ff00ff; }
            100% { border-color: #ff0000; box-shadow: 0 0 10px #ff0000; }
        }
        @keyframes text-glow {
            0% { color: #ff00ff; text-shadow: 0 0 5px #ff00ff; }
            50% { color: #00ffff; text-shadow: 0 0 5px #00ffff; }
            100% { color: #ff00ff; text-shadow: 0 0 5px #ff00ff; }
        }
        body {
            background-color: #050505; color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px; max-width: 800px; margin: auto;
            box-sizing: border-box;
        }
        h1 { 
            text-align: center; font-weight: 800; text-transform: uppercase;
            letter-spacing: 3px; font-size: 2rem; animation: text-glow 4s infinite linear;
            margin-bottom: 30px;
        }
        .controls-container {
            display: flex; flex-direction: column; gap: 15px; margin-bottom: 30px;
        }
        .btn {
            background: #121212; color: #ffffff; border: 2px solid #ff00ff;
            padding: 15px; border-radius: 8px; font-weight: bold; font-size: 1.1rem;
            text-transform: uppercase; letter-spacing: 1px; cursor: pointer;
            box-shadow: 0 0 8px #ff00ff; text-align: center; text-decoration: none;
            transition: all 0.3s ease;
        }
        .btn:hover {
            background: #ffffff; color: #000000; border-color: #ffffff; box-shadow: 0 0 15px #ffffff;
        }
        .player-box {
            background: #111; border: 1px solid #333; padding: 20px; border-radius: 12px;
            margin-bottom: 30px; text-align: center;
        }
        audio { width: 100%; margin-top: 15px; }
        .track-title { font-size: 1.2rem; font-weight: bold; color: #00ffff; min-height: 1.5rem; }
        .albums-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px;
        }
        .album-card {
            background-color: #121212; padding: 20px; border-radius: 12px;
            border: 2px solid #ff0000; text-align: center; cursor: pointer;
            animation: rgb-shadow 6s infinite linear;
        }
        .album-title { font-size: 1.4rem; font-weight: bold; margin: 0 0 5px 0; color: #fff; }
        .album-count { font-size: 0.9rem; color: #888; }
    </style>
</head>
<body>

    <h1>Выбор Песен</h1>

    <div class="player-box">
        <div class="track-title" id="currentTrackTitle">Плеер пуст. Выберите альбом или перемешайте треки</div>
        <audio id="mainAudio" controls></audio>
    </div>

    <div class="controls-container">
        <button class="btn" id="randomBtn">🔀 Включить случайный трек</button>
        <a href="index.html" class="btn" style="border-color: #ff0000; box-shadow: 0 0 8px #ff0000;">🏠 На главную</a>
    </div>

    <div class="albums-grid">
        <div class="album-card" onclick="playAlbum('all')">
            <div class="album-title">Все каверы</div>
            <div class="album-count">Полный список треков</div>
        </div>
    </div>

    <script>
        // Сюда ты можешь вписывать свои ссылки на Dropbox напрямую. 
        // Важно: в конце ссылки обязательно должно быть &raw=1 или &dl=1, чтобы музыка играла!
        const playlist = [
            { title: "Тестовый трек Анархия", url: "https://www.dropbox.com/scl/fi/twzpte4l2gxucq7wbvghe/abarhiA.jpg?rlkey=x95xy34xtu0wzvdrhj0xpasp3&st=6uw5yojm&raw=1" }
        ];

        const audio = document.getElementById('mainAudio');
        const titleDisplay = document.getElementById('currentTrackTitle');
        let currentTrackIndex = 0;

        function playTrack(index) {
            if (playlist.length === 0) return;
            currentTrackIndex = index;
            const track = playlist[currentTrackIndex];
            titleDisplay.textContent = "Играет: " + track.title;
            audio.src = track.url;
            audio.play().catch(e => console.log("Автозапуск заблокирован браузером, нажмите Play руками"));
        }

        function playRandom() {
            if (playlist.length === 0) return;
            const randomIndex = Math.floor(Math.random() * playlist.length);
            playTrack(randomIndex);
        }

        function playAlbum(type) {
            playTrack(0);
        }

        document.getElementById('randomBtn').addEventListener('click', playRandom);

        // Автопереключение на следующий трек, когда песня закончилась
        audio.addEventListener('ended', () => {
            let nextIndex = currentTrackIndex + 1;
            if (nextIndex >= playlist.length) nextIndex = 0;
            playTrack(nextIndex);
        });
    </script>
</body>
</html>
